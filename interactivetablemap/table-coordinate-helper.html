<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Table Coordinate Helper</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f5f5f5;
    }

    #controls {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    #map-container {
      position: relative;
      display: inline-block;
      border: 1px solid #ccc;
      background: white;
    }

    #map-image {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #last-click {
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .marker {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 0, 150, 0.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 2px solid white;
      box-shadow: 0 0 3px rgba(0, 0, 0, 0.4);
    }

    #output {
      width: 100%;
      margin-top: 0.5rem;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label>
      Table Number:
      <input id="tableId" type="text" placeholder="e.g. A1" />
    </label>
    <button id="clearMarkers">Clear markers</button>
  </div>

  <div id="map-container">
    <!-- Update src to match your actual filename/path -->
    <img id="map-image" src="Screenshot 2026-03-12 at 11.34.01 AM.png" alt="Seating Map" />
  </div>

  <div id="last-click"></div>
  <textarea id="output" rows="4" readonly></textarea>

  <script>
    const img = document.getElementById('map-image');
    const container = document.getElementById('map-container');
    const lastClick = document.getElementById('last-click');
    const output = document.getElementById('output');
    const tableIdInput = document.getElementById('tableId');
    const clearBtn = document.getElementById('clearMarkers');

    img.addEventListener('click', (event) => {
      const rect = img.getBoundingClientRect();
      const xPx = event.clientX - rect.left;
      const yPx = event.clientY - rect.top;
      const xPct = (xPx / rect.width) * 100;
      const yPct = (yPx / rect.height) * 100;

      const tableId = tableIdInput.value.trim() || '(no table id entered)';

      // Show a visual marker
      const marker = document.createElement('div');
      marker.className = 'marker';
      marker.style.left = xPct + '%';
      marker.style.top = yPct + '%';
      container.appendChild(marker);

      const line = `Table ${tableId}, x=${xPct.toFixed(2)}, y=${yPct.toFixed(2)}`;
      lastClick.textContent = 'Last click: ' + line;

      // Append to textarea so you can copy all at once later
      output.value += line + '\n';

      // Optional: auto-advance table number (for A1, A2, ...)
      autoIncrementTable(tableIdInput);
    });

    clearBtn.addEventListener('click', () => {
      Array.from(document.querySelectorAll('.marker')).forEach(m => m.remove());
      lastClick.textContent = '';
    });

    function autoIncrementTable(inputEl) {
      const v = inputEl.value.trim();
      if (!v) return;
      const m = v.match(/^([A-Z]+)(\d+)$/i);
      if (!m) return;
      const prefix = m[1];
      const num = parseInt(m[2], 10);
      inputEl.value = prefix.toUpperCase() + (num + 1);
    }
  </script>
</body>
</html>
